<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel complex</title>
</head>
<body>
    <table border="1"> <!--Atribut di dalam tabel border=untuk garis di sel, cellspacing=jarak antar sel, cellpadding=beri luas antar sel, colspan=gabung 2 buah sel yg hr , rowspan=utk gabung 2 atau lebih garis-->
        <thead> <!--tabel header-->
            <tr>
                <th></th>
                <th>ngoding js</th>
                <th>ngoding php</th>
            </tr>
        </thead>
        <tbody> <!--tabel body-->
            <tr>
                <th>tipe data</th> <!--header-->
                <td>variabel const, di js</td>
                <td>variabel dolar, di php</td>
            </tr>
            <tr>
                <th>fullstack</th> <!--header-->
                <td>frontend, js</td>
                <td>backend, php</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
